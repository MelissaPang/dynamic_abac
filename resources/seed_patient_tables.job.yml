# Serverless job: seed Delta tables + ABAC row-filter policies (existing governed tags), then proof notebook.

resources:
  jobs:
    seed_patient_tables:
      name: ${bundle.name}-seed-patient-tables

      tasks:
        - task_key: seed_delta
          python_wheel_task:
            package_name: dynamic_abac_demo
            entry_point: seed
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
              - "--abac-tag-key"
              - "${var.abac_tag_key}"
              - "--abac-tag-value"
              - "${var.abac_tag_value}"
              - "--abac-tag-key2"
              - "${var.abac_tag_key2}"
              - "--abac-tag-key2-value"
              - "${var.abac_tag_key2_value}"
          environment_key: default

        - task_key: verify_abac_notebook
          depends_on:
            - task_key: seed_delta
          notebook_task:
            notebook_path: ../notebooks/verify_abac_policies.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl
