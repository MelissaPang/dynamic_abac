# Serverless Python wheel job: bundled CSVs -> Delta tables in {catalog}.{schema}.

resources:
  jobs:
    seed_patient_tables:
      name: ${bundle.name}-seed-patient-tables

      tasks:
        - task_key: seed_delta
          python_wheel_task:
            package_name: dynamic_abac_demo
            entry_point: seed
            parameters:
              - "--catalog"
              - "${var.catalog}"
              - "--schema"
              - "${var.schema}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl
