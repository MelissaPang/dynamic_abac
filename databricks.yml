# Databricks Asset Bundle — deploy a job that seeds Delta tables in Unity Catalog.
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html

bundle:
  name: dynamic_abac
  uuid: 8f4c2b1a-0e3d-4c7a-9b2e-6d1a5f8e9c0b

include:
  - resources/*.yml

artifacts:
  demo_wheel:
    type: whl
    build: |
      set -e
      python3 -m venv .bundle-venv
      .bundle-venv/bin/pip install -q build hatchling
      .bundle-venv/bin/python -m build --wheel .

variables:
  catalog:
    description: Unity Catalog name where schema and Delta tables are created (catalog must already exist).
    default: melissap
  schema:
    description: Schema within the catalog for patient demo tables.
    default: demo_dynamic_abac
  abac_tag_key:
    description: Governed tag key on *_with_abac tables (SET TAG ON TABLE; pair with abac_tag_value).
    default: abac
  abac_tag_value:
    description: Tag value for abac_tag_key on tables (SQL string semantics). Empty string for key-only table tag.
    default: "true"
  abac_tag_key2:
    description: Governed tag key on patient_id (SET TAG ON COLUMN; policy MATCH uses has_tag or has_tag_value).
    default: abac_pii_types
  abac_tag_key2_value:
    description: Governed enum value for abac_tag_key2 on patient_id (empty/whitespace-only = key-only if UC allows). Example enums include ssn, address, executed_by, RUT.
    default: ssn

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
      # Avoids "multiple profiles matched" when running `databricks bundle` / `set_up.py` without --profile
      profile: e2-demo-field-eng
  prod:
    mode: production
